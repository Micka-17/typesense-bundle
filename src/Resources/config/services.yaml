# L'indentation est CRUCIALE en YAML. Utilisez 2 espaces, pas de tabulations.
services:
  # Ce niveau est indenté de 2 espaces
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  # Ce service est au même niveau que _defaults (2 espaces)
  Micka17\TypesenseBundle\Service\TypesenseClient:
    # Les options de ce service sont indentées de 4 espaces
    public: true
    arguments:
      $apiKey: '%env(TYPESENSE_API_KEY)%'
      $host: '%env(TYPESENSE_HOST)%'
      $port: '%env(TYPESENSE_PORT)%'
      $protocol: '%env(TYPESENSE_PROTOCOL)%'

  # Ce service est aussi au même niveau que _defaults (2 espaces)
  Micka17\TypesenseBundle\EventSubscriber\AutoUpdateSubscriber:
    # Les options de ce service sont indentées de 4 espaces
    arguments:
      $isEnabled: '%typesense.auto_update.enabled%'
      $indexedEntities: '%typesense.indexable_entities%'

    # Le tag est indenté de 4 espaces
    tags:
      # L'élément de la liste est indenté de 6 espaces
      - { name: 'doctrine.event_subscriber' }