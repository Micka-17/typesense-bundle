services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  # ... Les déclarations pour TypesenseClient et TypesenseManager ne changent pas ...
  Micka17\TypesenseBundle\Service\TypesenseClient:
    #...
  Micka17\TypesenseBundle\Service\TypesenseManager:
    public: true

  # On déclare notre nouveau service
  Micka17\TypesenseBundle\Service\TypesenseNormalizer:
    # On injecte le service Doctrine pour qu'il puisse lire les métadonnées
    arguments:
        $doctrine: '@doctrine'

  # On met à jour le listener pour qu'il utilise notre nouveau normalizer
  Micka17\TypesenseBundle\EventListener\AutoUpdateListener:
    arguments:
      $isEnabled: '%typesense.auto_update.enabled%'
      $indexedEntities: '%typesense.indexable_entities%'
      $typesenseManager: '@Micka17\TypesenseBundle\Service\TypesenseManager'
      $typesenseNormalizer: '@Micka17\TypesenseBundle\Service\TypesenseNormalizer'
    tags:
      - { name: 'doctrine.event_listener', event: 'postPersist', method: 'postPersist' }
      - { name: 'doctrine.event_listener', event: 'postUpdate', method: 'postUpdate' }
      - { name: 'doctrine.event_listener', event: 'preRemove', method: 'preRemove' }